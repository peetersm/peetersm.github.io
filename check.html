<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Coordinaten Verificatie</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
               display: flex; 
               flex-direction: column; 
               align-items: center; 
               padding: 50px; 
               background-color: #f4f7f6; 
               overflow-x: auto;
            }
        .grid { display: flex; gap: 8px; margin-bottom: 25px; }
        input { 
            width: 30px; height: 55px; text-align: center; 
            font-size: 26px; border: 2px solid #bdc3c7; border-radius: 8px; 
            transition: all 0.3s; outline: none;
        }
        input:focus { border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .fixed { 
            width: 15px; height: 55px; text-align: center; 
            font-size: 40px; border: 2px solid #ffffff; border-radius: 8px; 
            transition: all 0.3s; outline: none;
        }
        .result { 
            font-size: 40px; 
        }
        button {
            padding: 12px 40px; font-size: 18px; cursor: pointer; font-weight: bold;
            background-color: #2ecc71; color: white; border: none; border-radius: 5px;
            box-shadow: 0 4px #27ae60;
        }
        button:active { box-shadow: 0 2px #27ae60; transform: translateY(2px); }
    </style>
</head>
<body>

    <h2>Voer de coordinaten in (15-cijfers)</h2>

    <div class="grid">
        <!-- Handmatige inputs voor maximale controle -->
        <input type="text" maxlength="1" id="c0">
        <input type="text" maxlength="1" id="c1">
        <div class="fixed">.</div>
        <input type="text" maxlength="1" id="c2">
        <input type="text" maxlength="1" id="c3">
        <input type="text" maxlength="1" id="c4">
        <input type="text" maxlength="1" id="c5">
        <input type="text" maxlength="1" id="c6">
        <input type="text" maxlength="1" id="c7">
        <div class="fixed">,</div>
        <input type="text" maxlength="1" id="c8">
        <div class="fixed">.</div>
        <input type="text" maxlength="1" id="c9">
        <input type="text" maxlength="1" id="c10">
        <input type="text" maxlength="1" id="c11">
        <input type="text" maxlength="1" id="c12">
        <input type="text" maxlength="1" id="c13">
        <input type="text" maxlength="1" id="c14">
    </div>

    <button onclick="checkCode()">CHECK</button>
    <br>
    <div>
        <label class= "result" id="resultTxt">Success</label>
    </div>
<script>
        const messages = [ "Neeje, komaan opnief.",
                           "Doeme, das wer ni zjust.",
                           "Nog nie zjust, naa me kleurkes oem te helpe!!!",
                           "Alle, zoe moeijelijk is da naa toch nie.",
                           "Oej, got da wel lukke?",
                           "Optenief.",
                           "Tis precies moeijelak.",
                           "Zelfs ik wor er moeg van",
                           "Pffffffft",
                           "Blaaive probeire."]; 
        const ref = ["NQ==", "MQ==", "NA==", "MA==", "NA==", "NQ==", "Mg==", "OQ==", "NA==", "OQ==", "OQ==", "MQ==", "Mw==", "Mg==", "MA=="];
        const nbrOfDigits = 15;
        const helpFrom    = 3;
        let nbrOfTries    = 0;


        // Automatisch naar volgende veld springen
        const inputs = document.querySelectorAll('input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < (nbrOfDigits - 1)) {
                    inputs[index + 1].focus();
                    inputs[index + 1].select();
                }
            });
        });

        function checkCode() {
            let correctCount = 0;
            let messageIdx   = 0;
            let encodedVal   = "";

            nbrOfTries++;

            for (let i = 0; i < nbrOfDigits; i++) {
                const el = document.getElementById('c' + i);
                const val = el.value;

                if (btoa(val) === ref[i] && val !== "") {
                    if (nbrOfTries >= helpFrom) {
                        el.style.backgroundColor = "#2ecc71"; // Fel groen
                        el.style.color = "white";
                        el.style.borderColor = "#27ae60";
                    }
                    correctCount++;
                } else {
                    if (nbrOfTries >= helpFrom) {
                        el.style.backgroundColor = "#e74c3c"; // Fel rood
                        el.style.color = "white";
                        el.style.borderColor = "#c0392b";
                    }
                }
            }
            
            if (correctCount !== nbrOfDigits) {
                messageIdx = nbrOfTries - 1
                if (nbrOfTries >=  messages.length){ messageIdx = (messages.length - 1)}
                document.getElementById("resultTxt").textContent = "[" + nbrOfTries + "] " + messages[messageIdx];
            } else {
                document.getElementById("resultTxt").textContent = "Hola, hielemaal zjust. Goe gedoan.";
            }
        }
    </script>
</body>
</html>
